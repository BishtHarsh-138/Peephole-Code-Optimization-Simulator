<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peephole Code Optimization Simulator</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>

    <div class="container">

        <h1>Peephole Code Optimization Simulator</h1>

        <div class="panels">

            <div class="panel">
                <h2>Input Code</h2>
                <textarea id="inputCode"
                    placeholder="Enter C/C++ code here..."></textarea>
            </div>

            <div class="panel">
                <h2>Optimization Rules Applied</h2>
                <div id="rulesBox"></div>
            </div>

            <div class="panel">
                <h2>Optimized Output</h2>
                <textarea id="outputCode" readonly></textarea>
            </div>

        </div>

        <div class="buttons">
            <button id="optimizeBtn">Optimize Code</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div class="stats">
            <h2>Optimization Counter</h2>
            <p>
                Total Optimizations Applied:
                <span id="count">0</span>
            </p>
        </div>

        <!-- Symbol Table -->

        <div class="panel symbol-panel">

            <h2>Symbol Table</h2>

            <table id="symbolTable">

                <thead>
                    <tr>
                        <th>Variable</th>
                        <th>Occurrences</th>
                    </tr>
                </thead>

                <tbody id="symbolTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script src="3.js"></script>

</body>
</html>
